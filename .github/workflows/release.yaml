name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Build spoon zip
        run: just build

      - name: Create release
        run: |
          title=$(basename dist/*.zip .zip)
          gh release create ${{ github.ref_name }} \
            --title "$title" \
            --generate-notes --draft dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
